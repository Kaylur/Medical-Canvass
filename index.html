<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medical Locator Pro</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

        <div class="app">

            <!-- LEFT SIDEBAR -->
            <div class="sidebar">

                <h1>Medical Locator</h1>

                <!-- SEARCH -->
                <div class="search">
                    <input id="address" type="text" placeholder="Enter address..." />
                    <button id="searchBtn">Search</button>

                    <div class="radius-control">
                        <label>Radius: <span id="radiusValue">10</span> miles</label>
                        <input id="radius" type="range" min="5" max="35" value="10" />
                    </div>
                </div>

                <!-- FILTERS -->
                <div class="filters">

                    <label>Facility Type</label>
                    <select id="typeFilter">
                        <option value="all">All</option>
                        <option value="hospital">Hospital</option>
                        <option value="clinic">Clinic</option>
                        <option value="doctors">Doctors</option>
                        <option value="dentist">Dentist</option>
                    </select>

                    <label>Specialty</label>
                    <select id="specialtyFilter">
                        <option value="all">All Specialties</option>
                        <option value="addiction_medicine">Addiction Medicine</option>
                        <option value="allergist">Allergists</option>
                        <option value="anesthesiology">Anesthesiologists</option>
                        <option value="bariatrics">Bariatrics</option>
                        <option value="behavioral_health">Behavioral Health</option>
                        <option value="cardiology">Cardiology</option>
                        <option value="cardiothoracic_surgery">Cardiothoracic Surgery</option>
                        <option value="chiropractor">Chiropractors</option>
                        <option value="colorectal_surgery">Colorectal Surgery</option>
                        <option value="critical_care">Critical Care</option>
                        <option value="dermatology">Dermatology</option>
                        <option value="dentistry">Dentistry</option>
                        <option value="emergency_medicine">Emergency Medicine</option>
                        <option value="endocrinology">Endocrinology</option>
                        <option value="family_medicine">Family Medicine</option>
                        <option value="fertility_reproductive">Fertility / Reproductive Medicine</option>
                        <option value="gastroenterology">Gastroenterology</option>
                        <option value="geriatrics">Geriatrics</option>
                        <option value="general_surgery">General Surgery</option>
                        <option value="hematology">Hematology</option>
                        <option value="hospice">Hospice</option>
                        <option value="imaging_center">Imaging Centers</option>
                        <option value="infectious_disease">Infectious Disease</option>
                        <option value="internal_medicine">Internal Medicine</option>
                        <option value="maternal_fetal">Maternal-Fetal Medicine</option>
                        <option value="neonatology">Neonatology</option>
                        <option value="nephrology">Nephrology</option>
                        <option value="neurology">Neurology</option>
                        <option value="neurosurgery">Neurosurgery</option>
                        <option value="obstetrics_gynecology">Obstetrics &amp; Gynecology</option>
                        <option value="occupational_therapy">Occupational Therapy</option>
                        <option value="oncology">Oncology</option>
                        <option value="ophthalmology">Ophthalmology</option>
                        <option value="orthodontics">Orthodontics</option>
                        <option value="orthopedics">Orthopedics</option>
                        <option value="osteopathy">Osteopathy</option>
                        <option value="otolaryngology">Otolaryngology (ENT)</option>
                        <option value="pain_management">Pain Management</option>
                        <option value="pathology">Pathology</option>
                        <option value="pediatrics">Pediatrics</option>
                        <option value="pharmacy">Pharmacy</option>
                        <option value="physical_therapy">Physical Therapy</option>
                        <option value="plastic_surgery">Plastic Surgery</option>
                        <option value="podiatry">Podiatry</option>
                        <option value="primary_care">Primary Care</option>
                        <option value="psychiatry">Psychiatry</option>
                        <option value="psychology">Psychology</option>
                        <option value="pulmonology">Pulmonology</option>
                        <option value="radiology">Radiology</option>
                        <option value="rheumatology">Rheumatology</option>
                        <option value="sleep_medicine">Sleep Medicine</option>
                        <option value="speech_therapy">Speech Therapy</option>
                        <option value="sports_medicine">Sports Medicine</option>
                        <option value="urgent_care">Urgent Care</option>
                        <option value="urology">Urology</option>
                        <option value="vascular_medicine">Vascular Medicine</option>
                        <option value="vascular_surgery">Vascular Surgery</option>
                    </select>

                </div>

                <div id="status"></div>

                <!-- RESULTS -->
                <div id="results"></div>

            </div>

            <!-- RIGHT MAP -->
            <div id="map"></div>

        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="script.js"></script>


</body>
</html>
